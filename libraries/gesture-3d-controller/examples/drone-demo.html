<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone 3D - Gesture Controller Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        #webcam {
            position: absolute;
            left: 10px;
            top: 10px;
            width: 180px;
            height: 135px;
            z-index: 100;
            border: 3px solid rgba(0, 255, 0, 0.3);
            border-radius: 8px;
            transform: rotateY(180deg);
            object-fit: cover;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        #info {
            position: absolute;
            top: 200px;
            left: 10px;
            color: #0f0;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 4px;
            width: 200px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #0f0;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 4px;
            max-width: 300px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 18px;
            text-align: center;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div class="loading">🚁 Initialisation...</div>
    <video id="webcam" autoplay playsinline></video>
    <div id="info">Détection: --</div>
    <div id="status">En attente...</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GestureDetector, Object3DController, GestureMapper, WebcamManager } 
            from '../src/index.js';

        // ========== THREE.JS SETUP ==========
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // ========== LIGHTING ==========
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const light1 = new THREE.DirectionalLight(0xffffff, 1.5);
        light1.position.set(5, 10, 7.5);
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0xffffff, 1.0);
        light2.position.set(-5, 5, -5);
        scene.add(light2);

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new THREE.Scene()).texture;

        // ========== DRONE MODEL ==========
        let drone = null;
        let dronePivot = new THREE.Group();
        scene.add(dronePivot);

        let objectController = null;
        let propellers = [];

        const loader = new GLTFLoader();
        loader.load('https://cdn.jsdelivr.net/npm/three-models/models/gltf/drone.glb', (gltf) => {
            const model = gltf.scene;

            // Centrer le modèle
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.set(-center.x, -center.y, -center.z);

            dronePivot.add(model);
            drone = dronePivot;

            const scaleFactor = 1.0;
            drone.scale.set(scaleFactor, scaleFactor, scaleFactor);

            // Détecter les hélices
            const aerialBox = new THREE.Box3().setFromObject(model);
            const maxY = aerialBox.max.y;
            const minY = aerialBox.min.y;
            const height = maxY - minY;

            model.traverse((child) => {
                if (child.isMesh) {
                    const childPos = new THREE.Vector3();
                    child.getWorldPosition(childPos);
                    if (childPos.y > maxY - (height * 0.15)) {
                        propellers.push(child);
                    }
                }
            });

            console.log('✅ Modèle chargé avec', propellers.length, 'hélices');
            objectController = new Object3DController(drone);
            objectController.setPropellers(propellers);
        }, undefined, (error) => {
            console.error('❌ Erreur chargement modèle:', error);
            // Créer un cube fallback
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
            const cube = new THREE.Mesh(geometry, material);
            dronePivot.add(cube);
            drone = dronePivot;
            objectController = new Object3DController(drone);
        });

        // ========== GESTURE CONTROLLER ==========
        const gestureDetector = new GestureDetector({ numHands: 1 });
        const gestureMapper = new GestureMapper();
        const webcamManager = new WebcamManager(document.getElementById('webcam'));

        let isReady = false;
        let stats = { detections: 0, frames: 0 };

        // ========== INITIALIZATION ==========
        (async () => {
            try {
                document.querySelector('.loading').textContent = '📹 Initialisation MediaPipe...';
                await gestureDetector.init();
                
                document.querySelector('.loading').textContent = '🎥 Demande d\'accès caméra...';
                await webcamManager.start();
                
                gestureDetector.start();
                isReady = true;
                document.querySelector('.loading').style.display = 'none';
                document.getElementById('status').textContent = '✅ PRÊT! Bouge ta main devant la caméra';
            } catch (error) {
                document.querySelector('.loading').textContent = '❌ ERREUR: ' + error.message;
                console.error(error);
            }
        })();

        // ========== ANIMATION LOOP ==========
        function animate() {
            requestAnimationFrame(animate);
            stats.frames++;

            if (isReady && webcamManager.isActive() && objectController) {
                const detectionResult = gestureDetector.detect(document.getElementById('webcam'));

                if (detectionResult.detected) {
                    stats.detections++;
                    const gestureData = gestureMapper.mapGesture(detectionResult.landmarks);
                    const gestureType = gestureMapper.detectGestureType(detectionResult.landmarks);
                    
                    objectController.updateFromGesture(gestureData);
                    objectController.rotatePropellers();

                    // Update info panel
                    const posX = drone.position.x.toFixed(2);
                    const posY = drone.position.y.toFixed(2);
                    const posZ = drone.position.z.toFixed(2);
                    const rotY = (drone.rotation.y * 180 / Math.PI).toFixed(1);
                    const palmSize = (gestureData.palmSize * 100).toFixed(1);

                    document.getElementById('info').innerHTML = `
                        <b>📍 POSITION</b><br>
                        X: ${posX} | Y: ${posY} | Z: ${posZ}<br>
                        <br>
                        <b>🔄 ROTATION</b><br>
                        Y: ${rotY}°<br>
                        <br>
                        <b>👋 GESTE</b><br>
                        ${gestureType.type} (${(gestureType.confidence * 100).toFixed(0)}%)<br>
                        <br>
                        <b>✋ PAUME</b><br>
                        Taille: ${palmSize}%
                    `;
                } else {
                    objectController.returnToCenter();
                    document.getElementById('info').innerHTML = `
                        <b>📍 POSITION</b><br>
                        -- -- --<br>
                        <br>
                        <b>🔄 ROTATION</b><br>
                        -- --<br>
                        <br>
                        <b>👋 GESTE</b><br>
                        -- -- -- --<br>
                        <br>
                        <b>✋ PAUME</b><br>
                        -- --
                    `;
                }

                // Update status bar
                const detectionRate = stats.frames > 0 ? ((stats.detections / stats.frames) * 100).toFixed(1) : 0;
                document.getElementById('status').innerHTML = `
                    <b>🖐️ GESTURE CONTROLLER</b><br>
                    Taux détection: ${detectionRate}%<br>
                    FPS: ${stats.frames}<br>
                    Caméra: ${detectionResult.detected ? '✅ Actif' : '❌ En attente'}<br>
                    <br>
                    <b>💡 CONTRÔLES:</b><br>
                    🖱️ Souris: Orbiter<br>
                    🖐️ Main: Contrôler drone
                `;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ========== RESPONSIVE ==========
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
